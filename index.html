<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DR Assessment Builder</title>
<style>
body{font-family:Arial,sans-serif;background:#f2f5f7;margin:0;padding:20px}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,.1)}
h1{text-align:center;color:#005ea5}
button{padding:12px;width:100%;background:#005ea5;color:#fff;border:none;border-radius:5px;margin-top:10px}
input,select{width:100%;padding:10px;margin:5px 0 15px}
pre{background:#f8f8f8;padding:15px;border-radius:5px;white-space:pre-wrap}
</style>
</head>
<body>
<div class="container">
<h1>DR Assessment Builder</h1>
<div id="questionBox"></div>
<div id="answerBox"></div>
<button id="nextBtn" onclick="nextQuestion()">Next</button>
<pre id="output"></pre>
</div>
<script>
let answers={};
let questions=[
{id:"project",text:"Project Title",type:"text"},
{id:"client",text:"Client Name",type:"text"},
{id:"location",text:"Location",type:"text"},
{id:"assessor",text:"Assessor Name",type:"text"},
{id:"activity",text:"Activity",type:"select",options:["Working at Height","Confined Space","Hot Works","Electrical Work","Rail Work","Steelworks Maintenance"]}
];
let currentQuestion=0;
const hazardLibrary={
"Working at Height":["Falls from height","Falling objects","Ladder failure","MEWP overturning"],
"Confined Space":["Oxygen deficiency","Toxic atmosphere","Restricted access","Rescue difficulties"],
"Hot Works":["Fire","Explosion","Burns","Fume inhalation"],
"Electrical Work":["Electric shock","Arc flash","Unexpected energisation"],
"Rail Work":["Train strike","Electrocution","Slips Trips Falls","Fatigue"],
"Steelworks Maintenance":["Moving plant","Overhead cranes","Hot surfaces","Vehicle interface","Pressurised systems"]
};
function calculateRisk(l,s){let score=l*s;let c="Low";if(score>5)c="Medium";if(score>10)c="High";if(score>15)c="Very High";return {score:score,category:c};}
function renderQuestion(){
let q=questions[currentQuestion];
questionBox.innerHTML="<h2>"+q.text+"</h2>";
if(q.type==="text"){answerBox.innerHTML='<input id="answer">';}
else{answerBox.innerHTML='<select id="answer">'+q.options.map(o=>'<option>'+o+'</option>').join('')+'</select>';}
}
function nextQuestion(){
let q=questions[currentQuestion];
answers[q.id]=document.getElementById("answer").value;
if(q.id==="activity"&&answers.activity==="Working at Height"&&!questions.find(x=>x.id==="height")){
questions.push({id:"height",text:"Maximum working height (metres)",type:"text"});
}
currentQuestion++;
if(currentQuestion<questions.length){renderQuestion();}else{generateRAMS();}
}
function generateRAMS(){
nextBtn.style.display="none";questionBox.style.display="none";answerBox.style.display="none";
let hazards=hazardLibrary[answers.activity]||[];
let risk=calculateRisk(4,5);
let report="DR ASSESSMENT BUILDER RAMS\n\n";
report+="Project: "+answers.project+"\n";
report+="Client: "+answers.client+"\n";
report+="Location: "+answers.location+"\n";
report+="Assessor: "+answers.assessor+"\n";
report+="Activity: "+answers.activity+"\n\n";
hazards.forEach(h=>report+="- "+h+" | Risk Score: "+risk.score+" ("+risk.category+")\n");
output.textContent=report;
}
renderQuestion();
</script>
</body>
</html>
