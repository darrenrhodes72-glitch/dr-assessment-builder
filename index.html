<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DR Assessment Builder Pro V1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{font-family:Arial;background:#eef2f7;margin:0;padding:20px}
.card{max-width:1000px;margin:auto;background:#fff;padding:20px;border-radius:12px}
input,textarea,select,button{width:100%;padding:10px;margin:6px 0}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:6px}
pre{white-space:pre-wrap;background:#f7f7f7;padding:10px}
</style>
</head>
<body>
<div class="card">
<h1>DR Assessment Builder Pro V1</h1>

<h2>Project Details</h2>
<input id="project" placeholder="Project Name">
<input id="client" placeholder="Client">
<input id="location" placeholder="Location">
<input id="assessor" placeholder="Assessor">
<input id="reviewDate" type="date">

<h2>Activity</h2>
<textarea id="activity" placeholder="Describe the activity"></textarea>

<h2>Add Hazard</h2>
<input id="hazard" placeholder="Hazard">
<select id="likelihood"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
<select id="severity"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
<input id="control" placeholder="Control Measure">
<button onclick="addHazard()">Add Hazard</button>

<table id="hazTable">
<tr><th>Hazard</th><th>L</th><th>S</th><th>Risk</th><th>Category</th><th>Control</th></tr>
</table>

<button onclick="previewRAMS()">Generate RAMS Preview</button>
<button onclick="saveAssessment()">Save Assessment</button>
<button onclick="loadAssessment()">Load Assessment</button>
<button onclick="exportPDF()">Export PDF</button>

<h2>RAMS Preview</h2>
<pre id="preview"></pre>
</div>

<script>
let assessment={hazards:[]};

function category(score){
 if(score<=5)return "Low";
 if(score<=10)return "Medium";
 if(score<=15)return "High";
 return "Very High";
}

function addHazard(){
 let h=hazard.value;
 let l=parseInt(likelihood.value);
 let s=parseInt(severity.value);
 let r=l*s;
 let c=control.value;

 assessment.hazards.push({h,l,s,r,cat:category(r),c});

 let row=`<tr>
 <td>${h}</td><td>${l}</td><td>${s}</td>
 <td>${r}</td><td>${category(r)}</td><td>${c}</td>
 </tr>`;
 hazTable.innerHTML+=row;

 hazard.value='';
 control.value='';
}

function previewRAMS(){
 let txt="";
 txt+="DR ASSESSMENT BUILDER PRO V1\n\n";
 txt+="Project: "+project.value+"\n";
 txt+="Client: "+client.value+"\n";
 txt+="Location: "+location.value+"\n";
 txt+="Assessor: "+assessor.value+"\n";
 txt+="Review Date: "+reviewDate.value+"\n\n";

 txt+="ACTIVITY\n"+activity.value+"\n\n";

 txt+="RISK ASSESSMENT\n";
 assessment.hazards.forEach(x=>{
  txt+=`- ${x.h} | Risk ${x.r} (${x.cat}) | Control: ${x.c}\n`;
 });

 txt+="\nMETHOD STATEMENT\n";
 txt+="1. Attend induction\n";
 txt+="2. Brief workforce\n";
 txt+="3. Implement controls\n";
 txt+="4. Complete activity safely\n";
 txt+="5. Leave area safe\n";

 txt+="\nPPE\n- Helmet\n- Safety Boots\n- Hi-Vis\n- Gloves\n- Safety Glasses\n";

 txt+="\nEMERGENCY ARRANGEMENTS\nCall site emergency procedures and 999 if required.\n";

 preview.textContent=txt;
}

function saveAssessment(){
 assessment.project=project.value;
 assessment.client=client.value;
 assessment.location=location.value;
 assessment.assessor=assessor.value;
 assessment.reviewDate=reviewDate.value;
 assessment.activity=activity.value;
 localStorage.setItem("drAssessmentPro",JSON.stringify(assessment));
 alert("Assessment Saved");
}

function loadAssessment(){
 let d=localStorage.getItem("drAssessmentPro");
 if(!d) return alert("No saved assessment");
 assessment=JSON.parse(d);

 project.value=assessment.project||"";
 client.value=assessment.client||"";
 location.value=assessment.location||"";
 assessor.value=assessment.assessor||"";
 reviewDate.value=assessment.reviewDate||"";
 activity.value=assessment.activity||"";

 hazTable.innerHTML='<tr><th>Hazard</th><th>L</th><th>S</th><th>Risk</th><th>Category</th><th>Control</th></tr>';
 assessment.hazards.forEach(x=>{
  hazTable.innerHTML+=`<tr><td>${x.h}</td><td>${x.l}</td><td>${x.s}</td><td>${x.r}</td><td>${x.cat}</td><td>${x.c}</td></tr>`;
 });
}

async function exportPDF(){
 previewRAMS();
 const {jsPDF}=window.jspdf;
 const pdf=new jsPDF();
 const lines=pdf.splitTextToSize(preview.textContent,180);
 pdf.text(lines,10,10);
 pdf.save("DR-RAMS.pdf");
}
</script>
</body>
</html>
