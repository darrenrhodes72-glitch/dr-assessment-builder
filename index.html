<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DR Assessment Builder Pro V1.1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{font-family:Arial;background:#eef2f7;margin:0;padding:20px}
.card{max-width:1200px;margin:auto;background:#fff;padding:20px;border-radius:12px}
input,textarea,select,button{width:100%;padding:10px;margin:6px 0}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:6px}
pre{white-space:pre-wrap;background:#f7f7f7;padding:10px}
</style>
</head>
<body>
<div class="card">
<h1>DR Assessment Builder Pro V1.1</h1>

<h2>Project Details</h2>
<input id="project" placeholder="Project Name">
<input id="client" placeholder="Client">
<input id="location" placeholder="Location">
<input id="assessor" placeholder="Assessor">

<h2>Add Hazard</h2>
<input id="hazard" placeholder="Hazard">
<select id="likelihood"><option>1</option><option>2</option><option>3</option><option>4</option><option selected>5</option></select>
<select id="severity"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select>
<input id="control" placeholder="Control Measure">
<input id="resLikelihood" type="number" min="1" max="5" value="1" placeholder="Residual Likelihood">
<input id="resSeverity" type="number" min="1" max="5" value="1" placeholder="Residual Severity">
<button onclick="addHazard()">Add Hazard</button>

<table id="hazTable">
<tr>
<th>Hazard</th><th>L</th><th>S</th><th>Initial Risk</th><th>Category</th>
<th>Control</th><th>RL</th><th>RS</th><th>Residual Risk</th><th>Residual Category</th>
</tr>
</table>

<button onclick="previewRAMS()">Generate RAMS Preview</button>

<h2>RAMS Preview</h2>
<pre id="preview"></pre>
</div>

<script>
let assessment={hazards:[]};

function category(score){
 if(score<=5)return "Low";
 if(score<=10)return "Medium";
 if(score<=15)return "High";
 return "Very High";
}

function addHazard(){
 let h=hazard.value;
 let l=parseInt(likelihood.value);
 let s=parseInt(severity.value);
 let r=l*s;
 let c=control.value;

 let rl=parseInt(resLikelihood.value);
 let rs=parseInt(resSeverity.value);
 let rr=rl*rs;

 assessment.hazards.push({
  h,l,s,r,
  cat:category(r),
  c,
  rl,rs,
  rr,
  rcat:category(rr)
 });

 hazTable.innerHTML += `
 <tr>
 <td>${h}</td>
 <td>${l}</td>
 <td>${s}</td>
 <td>${r}</td>
 <td>${category(r)}</td>
 <td>${c}</td>
 <td>${rl}</td>
 <td>${rs}</td>
 <td>${rr}</td>
 <td>${category(rr)}</td>
 </tr>`;
}

function previewRAMS(){
 let txt="DR ASSESSMENT BUILDER PRO V1.1\n\n";
 txt+="Project: "+project.value+"\n";
 txt+="Client: "+client.value+"\n";
 txt+="Location: "+location.value+"\n";
 txt+="Assessor: "+assessor.value+"\n\n";

 assessment.hazards.forEach(x=>{
  txt+="Hazard: "+x.h+"\n";
  txt+="Initial Risk: "+x.r+" ("+x.cat+")\n";
  txt+="Control Measures: "+x.c+"\n";
  txt+="Residual Risk: "+x.rr+" ("+x.rcat+")\n";
  txt+="---------------------------\n";
 });

 preview.textContent=txt;
}
</script>
</body>
</html>
